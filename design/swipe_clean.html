<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Cleaner - 沉浸式手势清理</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            user-select: none;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border-left: 1px solid #1f1f1f;
            border-right: 1px solid #1f1f1f;
        }

        /* 顶部导航栏 */
        .top-nav {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: none;
            color: #ffffff;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .back-icon {
            width: 16px;
            height: 16px;
            border-bottom: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            transform: rotate(45deg);
        }

        .right-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            color: #8e8e93;
        }

        .undo-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        /* 中部区域 */
        .main-viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
            position: relative;
            touch-action: none; /* 禁用系统默认手势以支持自定义拖拽 */
        }

        /* 触控卡片容器 */
        .card-container {
            width: 100%;
            position: relative;
            aspect-ratio: 4 / 3;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2c2c2e 0%, #1c1c1e 100%);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            border: 1px solid #2c2c2e;
            cursor: grab;
            z-index: 2;
        }

        .photo-card:active {
            cursor: grabbing;
        }

        /* 带有过渡动画的归位样式 */
        .photo-card.smooth-transition {
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.15), opacity 0.3s ease;
        }

        /* 划出状态的过渡样式 */
        .photo-card.fly-out {
            transition: transform 0.3s ease-in, opacity 0.3s ease-in;
        }

        .photo-placeholder-text {
            color: #aeaeacf2;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            padding: 20px;
        }

        .photo-subtext {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 8px;
        }

        /* 更多操作触发点 */
        .more-details-trigger {
            position: absolute;
            bottom: 40px;
            left: 24px;
            color: #8e8e93;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            padding: 8px;
            z-index: 5;
        }

        /* 底部双层栏结构：操作区 + Tab 切换区 */
        .bottom-area-group {
            background-color: #000000;
            z-index: 10;
        }

        /* 单张操作栏 */
        .bottom-action-bar {
            padding: 12px 20px 20px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1c1c1e;
        }

        .icon-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            transition: transform 0.1s ease;
        }
        
        .action-icon-btn:active {
            transform: scale(0.9);
        }

        .icon-delete { color: #ff453a; }
        .icon-share { color: #ff9f0a; }
        .icon-heart { color: #ff3b30; }
        .icon-grid { color: #aeaeb2; }

        .keep-btn {
            background: rgba(48, 209, 88, 0.1);
            border: 1.5px solid #30d158;
            color: #30d158;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.2s;
        }

        .keep-btn:active {
            background: rgba(48, 209, 88, 0.25);
        }

        /* 全局系统级主 TabBar */
        .bottom-tabbar {
            height: 64px;
            background-color: #000000;
            border-top: 1px solid #1c1c1e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            height: 100%;
            cursor: pointer;
            text-decoration: none;
            color: #8e8e93;
        }

        .tab-icon {
            width: 22px;
            height: 22px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .tab-item.active {
            color: #0a84ff; /* 高亮蓝色 */
        }

        /* Tab 矢量线条图标 */
        .icon-tab-clean { border: 2px solid currentColor; border-radius: 4px; width: 16px; height: 16px; position: relative; }
        .icon-tab-clean::after { content: ''; position: absolute; width: 5px; height: 2px; background: currentColor; top: 2px; left: 3px; }
        
        .icon-tab-albums { border: 2px solid currentColor; border-radius: 2px; width: 16px; height: 14px; position: relative; }
        .icon-tab-albums::after { content: ''; position: absolute; width: 3px; height: 3px; border-radius: 50%; background: currentColor; top: 2px; left: 2px; }

        /* 视频压缩新图标架构 */
        .icon-tab-compress { width: 16px; height: 14px; border: 2px solid currentColor; border-radius: 2px; position: relative; display: flex; align-items: center; justify-content: center; }
        .icon-tab-compress::before { content: '➔'; font-size: 8px; position: absolute; transform: scaleX(0.7); font-weight: bold; }

        .icon-tab-settings { width: 14px; height: 14px; border: 2px solid currentColor; border-radius: 50%; position: relative; }

        /* 隐藏详情弹窗 */
        .info-toast {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(28, 28, 30, 0.95);
            border: 1px solid #2c2c2e;
            border-radius: 12px;
            padding: 14px;
            font-size: 13px;
            color: #e5e5ea;
            display: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .info-toast-line {
            margin-bottom: 4px;
        }
        .info-toast-line span {
            color: #8e8e93;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="top-nav">
            <button class="back-btn" onclick="alert('返回上一级')">
                <span class="back-icon"></span>
            </button>
            <div class="right-actions">
                <span id="progress-text">1/18</span>
                <button class="undo-btn" onclick="handleUndo()">撤销</button>
            </div>
        </header>

        <main class="main-viewer" id="gestureZone">
            <div class="card-container">
                <div class="photo-card smooth-transition" id="activePhotoCard">
                    <div class="photo-placeholder-text" id="photoTitle">
                        中华人民共和国<br>居民身份证
                    </div>
                    <div class="photo-subtext" id="photoMeta">照片 ID: IMG_1021.JPG</div>
                </div>
            </div>

            <div class="more-details-trigger" onclick="toggleInfoToast(event)">•••</div>

            <div class="info-toast" id="infoToast">
                <div class="info-toast-line"><span>📅 时间:</span>2026-06-05 14:22</div>
                <div class="info-toast-line"><span>📍 地点:</span>北京市海淀区</div>
                <div class="info-toast-line"><span>💾 大小:</span>4.8 MB (4032 × 3024)</div>
            </div>
        </main>

        <div class="bottom-area-group">
            <section class="bottom-action-bar">
                <div class="icon-group">
                    <button class="action-icon-btn icon-delete" onclick="animateOut('left')" title="删除 (向左划)">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                    <button class="action-icon-btn icon-share" onclick="alert('呼起原生系统分享')" title="分享">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
                    </button>
                    <button class="action-icon-btn icon-heart" onclick="alert('加入收藏夹')" title="喜欢">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                    </button>
                    <button class="action-icon-btn icon-grid" onclick="alert('切回网格总览列表')" title="网格列表">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </button>
                </div>

                <button class="keep-btn" onclick="animateOut('right')">
                    保留
                </button>
            </section>

            <nav class="bottom-tabbar">
                <div class="tab-item active">
                    <div class="tab-icon"><div class="icon-tab-clean"></div></div>
                    <span class="tab-label">快速清理</span>
                </div>
                <div class="tab-item" onclick="alert('切换至相册管家标签页')">
                    <div class="tab-icon"><div class="icon-tab-albums"></div></div>
                    <span class="tab-label">月度相册</span>
                </div>
                <div class="tab-item" onclick="alert('切换至视频压缩工具页')">
                    <div class="tab-icon"><div class="icon-tab-compress"></div></div>
                    <span class="tab-label">视频压缩</span>
                </div>
                <div class="tab-item" onclick="alert('打开系统设置')">
                    <div class="tab-icon"><div class="icon-tab-settings"></div></div>
                    <span class="tab-label">设置</span>
                </div>
            </nav>
        </div>

    </div>

    <script>
        let currentIndex = 1;
        const totalPhotos = 18;
        const mockPhotoNames = [
            "中华人民共和国<br>居民身份证", "宝贝午餐抓拍 02", "消防演练合影 03", 
            "车辆前脸特写 04", "糊掉的现场记录 05", "临时发票存根 06", "旧屏幕截图 07"
        ];

        const card = document.getElementById('activePhotoCard');
        const gestureZone = document.getElementById('gestureZone');

        let startX = 0;
        let currentX = 0;
        let isDragging = false;

        // 手势触控交互核心算法
        gestureZone.addEventListener('touchstart', (e) => {
            if(e.target.closest('.more-details-trigger')) return; // 避开详情按钮
            isDragging = true;
            startX = e.touches[0].clientX;
            card.classList.remove('smooth-transition', 'fly-out');
        });

        gestureZone.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            currentX = e.touches[0].clientX - startX;
            // 实时旋转弧度计算，手势向哪偏，卡片向哪斜
            let rotateDegree = currentX * 0.08; 
            card.style.transform = `translateX(${currentX}px) rotate(${rotateDegree}deg)`;
        });

        gestureZone.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            const threshold = 120; // 滑动动作生效的边界像素值

            if (currentX < -threshold) {
                // 左滑删除
                animateOut('left');
            } else if (currentX > threshold) {
                // 右滑保留
                animateOut('right');
            } else {
                // 没划够距离，弹性还原放回
                card.classList.add('smooth-transition');
                card.style.transform = 'none';
            }
            currentX = 0;
        });

        // 统一动画划出动作
        function animateOut(direction) {
            card.classList.remove('smooth-transition');
            card.classList.add('fly-out');
            
            if (direction === 'left') {
                card.style.transform = 'translateX(-160%) rotate(-15deg)';
                card.style.opacity = '0';
            } else {
                card.style.transform = 'translateX(160%) rotate(15deg)';
                card.style.opacity = '0';
            }

            setTimeout(() => {
                nextPhoto();
                // 复位拉回
                card.classList.remove('fly-out');
                card.style.transform = 'scale(0.8)';
                card.offsetHeight; // 触发回流重绘
                card.classList.add('smooth-transition');
                card.style.transform = 'none';
                card.style.opacity = '1';
            }, 250);
        }

        function nextPhoto() {
            if (currentIndex < totalPhotos) {
                currentIndex++;
            } else {
                alert('恭喜，本组照片已扫视完毕！将重置。');
                currentIndex = 1;
            }
            document.getElementById('progress-text').innerText = `${currentIndex}/${totalPhotos}`;
            const nameIndex = (currentIndex - 1) % mockPhotoNames.length;
            document.getElementById('photoTitle').innerHTML = mockPhotoNames[nameIndex];
            document.getElementById('photoMeta').innerText = `照片 ID: IMG_102${currentIndex}.JPG`;
            document.getElementById('infoToast').style.display = 'none';
        }

        function handleUndo() {
            if (currentIndex > 1) {
                currentIndex--;
                document.getElementById('progress-text').innerText = `${currentIndex}/${totalPhotos}`;
                const nameIndex = (currentIndex - 1) % mockPhotoNames.length;
                document.getElementById('photoTitle').innerHTML = mockPhotoNames[nameIndex];
                document.getElementById('photoMeta').innerText = `照片 ID: IMG_102${currentIndex}.JPG`;
            } else {
                alert('已是第一张');
            }
        }

        function toggleInfoToast(event) {
            event.stopPropagation();
            const toast = document.getElementById('infoToast');
            toast.style.display = toast.style.display === 'block' ? 'none' : 'block';
        }

        document.addEventListener('click', () => {
            document.getElementById('infoToast').style.display = 'none';
        });
    </script>
</body>
</html>
