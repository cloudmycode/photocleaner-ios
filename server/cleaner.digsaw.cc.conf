# PhotoCleaner Smart Search - Nginx 配置
# 域名: cleaner.digsaw.cc
# 服务器: 45.79.40.29
# 后端服务: 127.0.0.1:8081 (Go 程序)
# 网站根目录: /home/www/websites/cleaner.digsaw.cc

upstream smart_search_backend {
    server 127.0.0.1:8081;
    keepalive 32;
}

server {
    listen 80;
    server_name cleaner.digsaw.cc;

    # 强制 HTTPS 重定向
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cleaner.digsaw.cc;

    # SSL 证书配置 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/antivirus.maxdevlab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/antivirus.maxdevlab.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 访问日志
    access_log /var/log/nginx/cleaner.digsaw.cc_access.log;
    error_log /var/log/nginx/cleaner.digsaw.cc_error.log;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 限制请求大小
    client_max_body_size 10M;

    # 智能搜索 API - 反向代理到 Go 后端
    location /smart-search {
        proxy_pass http://smart_search_backend;
        proxy_http_version 1.1;
        
        # 传递原始请求信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 连接超时配置（LLM 调用可能较慢）
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 禁用缓冲（实时响应）
        proxy_buffering off;
        proxy_cache off;
        
        # 安全限制
        limit_except POST {
            deny all;
        }
    }

    # 健康检查接口
    location /health {
        proxy_pass http://smart_search_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 健康检查允许 GET 请求
        access_log off;
    }

    # API 根路径（可选）
    location /api/ {
        proxy_pass http://smart_search_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 默认拒绝（安全加固）
    location / {
        return 404;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }
}
